# /etc/nginx/sites-available/rareimagery.net
# Serves: Next.js frontend (port 3000) + Drupal backend (PHP-FPM)
# SSL: Let's Encrypt wildcard via Cloudflare DNS validation

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name rareimagery.net www.rareimagery.net *.rareimagery.net;
    return 301 https://$host$request_uri;
}

# -------------------------------------------------------------------
# Next.js frontend — rareimagery.net + *.rareimagery.net
# -------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name rareimagery.net www.rareimagery.net *.rareimagery.net;

    ssl_certificate     /etc/letsencrypt/live/rareimagery.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rareimagery.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Static assets — serve directly from standalone build, bypass Node
    location /_next/static/ {
        alias /var/www/rareimagery/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/rareimagery/public/;
        expires 30d;
        access_log off;
    }

    # Favicon, robots, sitemap
    location = /favicon.ico {
        root /var/www/rareimagery/public;
        access_log off;
    }

    location = /robots.txt {
        root /var/www/rareimagery/public;
        access_log off;
    }

    # Auth routes — no caching
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Buffer settings for large API responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts for serverless-style API routes
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# -------------------------------------------------------------------
# Drupal backend — cms.rareimagery.net (or keep on IP)
# Already configured separately. Keep your existing Drupal server block.
# If Drupal currently runs on this same Nginx, it stays as-is.
# Next.js connects to Drupal via DRUPAL_API_URL=http://127.0.0.1:80
# (or whatever port Drupal listens on — likely via PHP-FPM already).
# -------------------------------------------------------------------
